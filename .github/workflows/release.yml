name: Build firmware and publish release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-seed sdkconfig.json for Component Manager
        # CM reads `$CONFIG{...}` from <build_dir>/config/sdkconfig.json. On a
        # first CI build that file doesn't exist yet, so CM raises
        # MissingKconfigError for SENDSPIN_ENABLE_PLAYER (used in if-clauses
        # in sendspin-cpp's manifest). We pre-create the JSON with the role
        # flags. IDF_BUILD_V2=y tells CM to load this file on first run too.
        run: |
          mkdir -p build/config
          cat > build/config/sdkconfig.json <<'EOF'
          {
            "SENDSPIN_ENABLE_PLAYER": true,
            "SENDSPIN_ENABLE_CONTROLLER": true,
            "SENDSPIN_ENABLE_METADATA": true,
            "SENDSPIN_ENABLE_ARTWORK": false,
            "SENDSPIN_ENABLE_VISUALIZER": false
          }
          EOF

      - name: Build firmware (ESP-IDF v5.5)
        uses: espressif/esp-idf-ci-action@v1
        env:
          IDF_BUILD_V2: 'y'
        with:
          esp_idf_version: v5.5.1
          target: esp32s3
          path: '.'

      - name: Stage release artifacts
        run: |
          mkdir -p release
          cp build/bootloader/bootloader.bin       release/bootloader.bin
          cp build/partition_table/partition-table.bin release/partition-table.bin
          cp build/ota_data_initial.bin            release/ota_data_initial.bin
          cp build/sendspin-xiao.bin               release/sendspin-xiao.bin
          # esptool isn't on the GH runner (lives inside the ESP-IDF docker
          # image used by the build step). Install it for the merge call.
          pip install --quiet esptool
          # Esptool-compatible merged image for one-shot flashing
          python -m esptool --chip esp32s3 merge_bin -o release/sendspin-xiao-merged.bin \
              --flash_mode dio --flash_freq 80m --flash_size 8MB \
              0x0      release/bootloader.bin \
              0x8000   release/partition-table.bin \
              0xf000   release/ota_data_initial.bin \
              0x20000  release/sendspin-xiao.bin
          ls -la release/

      - name: Generate web-flasher manifest
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          mkdir -p web-flasher
          cat > web-flasher/manifest.json <<EOF
          {
            "name": "Sendspin XIAO",
            "version": "${VERSION}",
            "home_assistant_domain": "music_assistant",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "${BASE}/sendspin-xiao-merged.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          cp web-flasher/manifest.json release/manifest.json
          cat release/manifest.json

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Pull the curated section for this tag out of CHANGELOG.md and
          # prepend it to the static flash instructions. awk grabs everything
          # between `## [vX.Y.Z]` and the next `## [` heading.
          VERSION="${GITHUB_REF_NAME}"
          {
            if [ -f CHANGELOG.md ]; then
              awk -v ver="${VERSION}" '
                $0 ~ "^## \\["ver"\\]" { in_section=1; next }
                in_section && /^## \[/  { exit }
                in_section              { print }
              ' CHANGELOG.md
            fi
            cat <<'EOF'

          ## Flash instructions

          ### Easiest (web flasher)
          Open <https://Jesstr8803.github.io/sendspin-xiao/> in Chrome or Edge, plug your XIAO ESP32-S3 in, hit **Install**.

          ### Manual (esptool.py)
          Install esptool: `pip install esptool`. Then with the XIAO plugged in:
          ```
          python -m esptool --chip esp32s3 -p <PORT> --baud 460800 write_flash 0x0 sendspin-xiao-merged.bin
          ```
          Replace `<PORT>` with `COM7` (Windows) or `/dev/ttyUSB0` etc.

          ### Subsequent updates (no USB)
          Use `tools/ota_push.py` from the repo, or POST the `sendspin-xiao.bin` to the device's `/ota` endpoint.
          EOF
          } > release/RELEASE_NOTES.md
          echo "--- generated notes ---"
          cat release/RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/bootloader.bin
            release/partition-table.bin
            release/ota_data_initial.bin
            release/sendspin-xiao.bin
            release/sendspin-xiao-merged.bin
            release/manifest.json
          body_path: release/RELEASE_NOTES.md
