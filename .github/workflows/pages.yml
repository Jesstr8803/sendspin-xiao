name: Deploy web flasher to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-flasher/**'
      - '.github/workflows/pages.yml'
  # `release: published` does NOT fire when the release is created by a
  # GITHUB_TOKEN-driven workflow (loop prevention). Listen for the release
  # workflow completing instead so v* tags auto-redeploy the flasher. Note
  # we deliberately don't filter on `branches:` — tag-triggered upstreams
  # set head_branch to the tag (e.g. v0.2.1), not main, so a branch filter
  # would silently never match. The job-level `if:` guards on conclusion.
  workflow_run:
    workflows: ["Build firmware and publish release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_run fires on success/failure/cancelled — only deploy on success.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release binary into web-flasher
        run: |
          # GitHub release assets don't serve CORS headers, so the browser can't
          # fetch them from a different origin (the Pages site). Download the
          # merged binary into web-flasher/ and rewrite manifest.json to use a
          # relative path — Pages serves static files with permissive CORS.
          set -e
          LATEST_TAG=$(curl -s "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" \
                        | grep -oP '"tag_name":\s*"\K[^"]+' || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No release yet; skipping binary stage."
            exit 0
          fi
          echo "Staging assets from release ${LATEST_TAG}"
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${LATEST_TAG}/sendspin-xiao-merged.bin" \
               -o web-flasher/sendspin-xiao-merged.bin
          cat > web-flasher/manifest.json <<EOF
          {
            "name": "Sendspin XIAO",
            "version": "${LATEST_TAG}",
            "home_assistant_domain": "music_assistant",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "sendspin-xiao-merged.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          ls -la web-flasher/
          cat web-flasher/manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-flasher

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
